wort:
  term: Wort
  def: "Liquid extracted from malted grain during mashing and boiling, before fermentation. The starting point for beer."

IPA:
  term: IPA
  def: "India Pale Ale — a hop-forward beer style characterised by pronounced bitterness and hop aroma."

mashing:
  term: Mashing
  def: "Soaking crushed malted grain in hot water at a controlled temperature to convert starches to fermentable sugars."

ABNS:
  term: ABNS
  def: "Acid-Based No-Rinse Sanitiser. The class of sanitisers based on dodecylbenzenesulfonic acid (DDBSA) and phosphoric acid. Examples: Star San, Sanipro Rinse, StellarSan, Chemsan. Safe to leave on food-contact surfaces without rinsing when used at correct dilution."

WDC:
  term: WDC
  def: "Wet-Dry Cycle. The process by which liquid applied to a surface evaporates, leaving non-volatile components concentrated as a dry residue. The key mechanism for understanding sanitiser behaviour on equipment. See: The wet-dry cycle model."

CF:
  term: CF
  def: "Concentration Factor. How many times more concentrated the non-volatile residue is compared to the original working solution, after evaporation. At complete drying of a 1:250 ABNS solution, CF = 250."

DDBSA:
  term: DDBSA
  def: "Dodecylbenzenesulfonic acid. The active surfactant in acid-based no-rinse sanitisers (ABNS). A long-chain anionic surfactant that disrupts microbial cell membranes at low pH. Non-volatile — it concentrates on surfaces as water evaporates."

DES:
  term: DES
  def: "Disinfectant Ethanol Sanitiser (ChemiPro DES). An ethanol-based (70–80%) sanitiser with no non-volatile residue. Evaporates completely, leaving no WDC risk. A-rated for all common homebrewing materials."

PP:
  term: PP
  def: "Polypropylene. A semi-crystalline polyolefin plastic widely used in fermenter buckets, lids, taps, and airlocks. Excellent chemical resistance across all homebrewing chemical environments. EU Regulation 10/2011 compliant."

HDPE:
  term: HDPE
  def: "High-Density Polyethylene. A polyolefin plastic used in fermenter taps and spray bottles. Slightly better chemical barrier properties than PP. EU Regulation 10/2011 compliant."

PET:
  term: PET
  def: "Polyethylene terephthalate. The plastic used in the FermZilla All Rounder, Oxebar mini keg, and PET bottles. Recycling code ♻️1. Extensively tested for food contact with carbonated beverages. Do not exceed 40 °C when cleaning."

EPDM:
  term: EPDM
  def: "Ethylene Propylene Diene Monomer rubber. A saturated-backbone elastomer used in fermenter grommets and tap washers. Better chemical resistance than NR or SBR. Rated B for DDBSA in realistic homebrewing use with post-batch cleaning."

POK:
  term: POK
  def: "Polyketone. An engineering thermoplastic used in current KegLand DuoTight push-fit fittings and the RAPT Pill body. Replaced POM due to POM's vulnerability to acid-catalysed degradation under WDC conditions. A-rated for all homebrewing chemicals."

POM:
  term: POM
  def: "Polyoxymethylene, also known as acetal or Delrin. An engineering thermoplastic used in John Guest push-fit fittings and older DuoTight collars. Susceptible to acid-catalysed chain-unzipping under WDC conditions, releasing formaldehyde. Rated D–X for ABNS."

ESC:
  term: ESC
  def: "Environmental Stress Cracking. Failure of a polymer under the combined action of mechanical stress and chemical exposure. The failure mode of POM DuoTight collars under repeated ABNS WDC cycles. Occurs below the material's normal stress threshold when chemical exposure is present."

SML:
  term: SML
  def: "Specific Migration Limit. The maximum permitted amount of a substance that may migrate from a food contact material into food or a food simulant, set by EU Regulation 10/2011. Expressed in mg/kg of food."

FKM:
  term: FKM
  def: "Fluoroelastomer — the ISO/ASTM class designation for the family of fluorinated synthetic rubbers commercially known as Viton. High chemical resistance, but cure system (peroxide vs. polyamine) significantly affects compatibility with phosphoric acid."

TPV:
  term: TPV
  def: "Thermoplastic Vulcanisate. A rubber-toughened thermoplastic that combines the chemical resistance of a vulcanised rubber with the processing advantages of thermoplastics. Santoprene is an EPDM/PP TPV used in the Oxebar Gen2 elbow and NukaTap valve shuttle."

PBW:
  term: PBW
  def: "Powdered Brewery Wash. A sodium metasilicate and percarbonate-based alkaline cleaner widely used in brewing. Removes organic soil through alkaline hydrolysis. A-rated for all common homebrewing plastic and elastomer materials at working concentrations."

OTR:
  term: OTR
  def: "Oxygen Transmission Rate. A measure of how quickly oxygen permeates through a packaging material. Lower OTR means better oxygen barrier and longer shelf life for packaged beer. Multilayer PET (Oxebar) and stainless steel have significantly lower OTR than plain PET."

SDS:
  term: SDS
  def: "Safety Data Sheet. A standardised document providing detailed information on a chemical substance or mixture — composition, hazards, handling, and regulatory status. The primary source for confirmed chemical composition data. EU format governed by REACH Regulation (EC) 1907/2006."

REACH:
  term: REACH
  def: "Registration, Evaluation, Authorisation and Restriction of Chemicals. EU Regulation (EC) 1907/2006. The primary EU chemicals regulation framework, which governs SDS format and substance disclosure requirements."

SVHC:
  term: SVHC
  def: "Substance of Very High Concern. A substance identified under REACH as having serious hazardous properties — carcinogenic, mutagenic, toxic to reproduction, or persistent/bioaccumulative. Cyclic siloxanes D4 and D5 found in silicone are SVHC-listed."

NR:
  term: NR
  def: "Natural Rubber. Vulcanised latex of Hevea brasiliensis. Used in budget grommets and washers. Carries N-nitrosamine precursor risk from sulphur-cure accelerators — invisible to inspection. Replace immediately with EPDM."

SBR:
  term: SBR
  def: "Styrene-Butadiene Rubber. A synthetic rubber sharing NR's unsaturated backbone and sulphur-cure chemistry. Same N-nitrosamine precursor risk as NR. Replace immediately with EPDM."
